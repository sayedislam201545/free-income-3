    <script>
      // Suppress known Telegram WebApp warnings that do not affect functionality
      const originalConsoleError = console.error;
      console.error = function() {
        if (arguments[0] && typeof arguments[0] === 'string' && arguments[0].includes('CloudStorage is not supported')) {
          return;
        }
        originalConsoleError.apply(console, arguments);
      };
    </script>
