        <script>
      const originalConsoleError = console.error;
      const originalConsoleWarn = console.warn;
      
      function shouldSuppress(args) {
          for (let i = 0; i < args.length; i++) {
              if (typeof args[i] === 'string' && (args[i].includes('CloudStorage is not supported') || args[i].includes('WebAppMethodUnsupported'))) {
                  return true;
              }
          }
          if (args.length > 0 && args[0] && args[0].message && args[0].message.includes('WebAppMethodUnsupported')) {
              return true;
          }
          return false;
      }

      console.error = function() {
        if (shouldSuppress(arguments)) return;
        originalConsoleError.apply(console, arguments);
      };
      console.warn = function() {
        if (shouldSuppress(arguments)) return;
        originalConsoleWarn.apply(console, arguments);
      };
      
      window.addEventListener('error', function(e) {
          if (e.message === 'Script error.') {
              e.preventDefault();
              e.stopImmediatePropagation();
              return true;
          }
          if ((e.message && (e.message.includes('CloudStorage is not supported') || e.message.includes('WebAppMethodUnsupported') || e.message === 'Script error.')) || (e.error && e.error.message && e.error.message.includes('WebAppMethodUnsupported'))) {
              e.preventDefault();
              e.stopImmediatePropagation();
          }
      });
      window.addEventListener('unhandledrejection', function(e) {
          if (e.reason && typeof e.reason === 'string' && (e.reason.includes('CloudStorage is not supported') || e.reason.includes('WebAppMethodUnsupported'))) {
              e.preventDefault();
              e.stopImmediatePropagation();
          } else if (e.reason && e.reason.message && e.reason.message.includes('WebAppMethodUnsupported')) {
              e.preventDefault();
              e.stopImmediatePropagation();
          }
      });
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Mock CloudStorage methods to prevent errors from third-party scripts
      if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage) {
          const fakeMethod = function() {
              const callback = arguments[arguments.length - 1];
              if (typeof callback === 'function') {
                  callback(null, null);
              } else if (typeof callback === 'undefined' && arguments.length > 0 && typeof arguments[arguments.length - 2] === 'function') {
                  arguments[arguments.length - 2](null, null);
              }
          };
          window.Telegram.WebApp.CloudStorage.setItem = fakeMethod;
          window.Telegram.WebApp.CloudStorage.getItem = fakeMethod;
          window.Telegram.WebApp.CloudStorage.getItems = fakeMethod;
          window.Telegram.WebApp.CloudStorage.removeItem = fakeMethod;
          window.Telegram.WebApp.CloudStorage.removeItems = fakeMethod;
          window.Telegram.WebApp.CloudStorage.getKeys = fakeMethod;
      }
    </script>
